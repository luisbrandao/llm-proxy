services:
  llm-proxy:
    build: .
    container_name: llm-proxy
    environment:
      - TZ=America/Sao_Paulo
      - CONFIG_PATH=/app/config.yaml
      # config.yaml edits are hot-reloaded (checked every N seconds; 0 disables).
      # Edit the host file IN PLACE — a rename-replace save detaches the bind mount.
      - CONFIG_RELOAD_INTERVAL=3
      - LOG_INPUT=false
      - LOG_OUTPUT=false
      - PORT=8000
      - PROXY_API_KEYS=sk-1234
      # Persist cumulative metric counters across restarts (optional).
      - METRICS_PERSIST=true
      - METRICS_PERSIST_PATH=/app/data/metrics_state.json
      - METRICS_FLUSH_INTERVAL=30
    volumes:
      # rw so runtime routing edits from the web console persist into the file.
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data            # holds metrics_state.json across restarts
    ports:
      - "9999:8000"
    restart: unless-stopped
