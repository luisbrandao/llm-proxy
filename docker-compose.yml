services:
  llm-proxy:
    build: .
    container_name: llm-proxy
    environment:
      - CONFIG_PATH=/app/config.yaml
      - LOG_INPUT=true
      - LOG_OUTPUT=true
      - PORT=9999
      - PROXY_API_KEYS=sk-1234
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "9999:9999"
    restart: unless-stopped
