services:
  llm-proxy:
    build: .
    container_name: llm-proxy
    env_file:
      - .env
    environment:
      - CONFIG_PATH=/app/config.yaml
      - LOG_INPUT=true
      - LOG_OUTPUT=true
      - PORT=8000
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "8001:8000"
    restart: unless-stopped
