services:
  deepseek-exporter:
    build: .
    container_name: deepseek-exporter
    environment:
      - DEEPSEEK_API_KEY=
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - LOG_INPUT=true
      - LOG_OUTPUT=true
      - PORT=8000
    ports:
      - "8001:8000"    
    restart: unless-stopped
